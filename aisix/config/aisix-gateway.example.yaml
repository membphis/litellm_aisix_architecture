server:
  listen: "0.0.0.0:4000"
  metrics_listen: "0.0.0.0:9090"
  request_body_limit_mb: 8

etcd:
  endpoints:
    - "http://127.0.0.1:2379"
  prefix: "/aisix"
  dial_timeout_ms: 5000

redis:
  url: "redis://127.0.0.1:6379"

log:
  level: "info"

runtime:
  worker_threads: 0

deployment:
  admin:
    enabled: true
    admin_keys:
      - key: "change-me-admin-key"
