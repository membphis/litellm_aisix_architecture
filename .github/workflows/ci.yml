name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            aisix/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('aisix/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --manifest-path aisix/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path aisix/Cargo.toml -- -D warnings

  test:
    name: Test (unit + integration)
    runs-on: ubuntu-latest
    needs: lint
    services:
      etcd:
        image: quay.io/coreos/etcd:v3.5.17
        env:
          ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
          ETCD_ADVERTISE_CLIENT_URLS: http://127.0.0.1:2379
          ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
          ETCD_INITIAL_ADVERTISE_PEER_URLS: http://127.0.0.1:2380
          ETCD_INITIAL_CLUSTER: default=http://127.0.0.1:2380
        ports:
          - 2379:2379
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            aisix/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('aisix/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --manifest-path aisix/Cargo.toml

  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: test
    # Smoke test requires OPENAI_API_KEY secret. Set it in repo Settings → Secrets.
    # The job runs always; smoke-phase1.sh will fail fast if the key is absent.
    services:
      etcd:
        image: quay.io/coreos/etcd:v3.5.17
        env:
          ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
          ETCD_ADVERTISE_CLIENT_URLS: http://127.0.0.1:2379
          ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
          ETCD_INITIAL_ADVERTISE_PEER_URLS: http://127.0.0.1:2380
          ETCD_INITIAL_CLUSTER: default=http://127.0.0.1:2380
        ports:
          - 2379:2379
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      AISIX_BASE_URL: http://127.0.0.1:4000
      AISIX_ADMIN_KEY: change-me-admin-key
      AISIX_VIRTUAL_KEY: sk-smoke-phase1

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            aisix/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('aisix/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build gateway (release)
        run: cargo build --manifest-path aisix/Cargo.toml --release -p aisix-gateway

      - name: Start gateway
        run: |
          ./aisix/target/release/aisix-gateway aisix/config/aisix-gateway.example.yaml &
          echo $! > /tmp/gateway.pid
          for i in $(seq 1 20); do
            curl -fsS http://127.0.0.1:4000/health && break || sleep 1
          done

      - name: Run smoke test
        run: bash aisix/scripts/smoke-phase1.sh

      - name: Stop gateway
        if: always()
        run: kill $(cat /tmp/gateway.pid) 2>/dev/null || true
